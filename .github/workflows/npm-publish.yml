name: Node.js Verify and Publish

on:
  push:
  merge_group:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: 0 23 * * * # Every 07:00 CST

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  actions: write
  checks: read
  contents: write
  deployments: read
  discussions: read
  id-token: write
  issues: write
  packages: read
  pages: read
  pull-requests: write
  repository-projects: read
  security-events: write
  statuses: write

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}

jobs:
  release_check:
    runs-on: ubuntu-latest
    outputs:
      skip_steps: ${{ steps.release_check.outputs.skip_steps }}
    steps:
      - name: Detect versioning commit
        id: release_check
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "merge_group" ]; then
            pattern='^ci: version packages( \(#[0-9]+\))?$'
            if printf '%s' "$COMMIT_MESSAGE" | grep -Eq "$pattern"; then
              echo "skip_steps=true" >> "$GITHUB_OUTPUT"
              echo "Versioning commit detected; skipping verification steps."
            else
              echo "skip_steps=false" >> "$GITHUB_OUTPUT"
              echo "Regular run; continuing."
            fi
          else
            echo "skip_steps=false" >> "$GITHUB_OUTPUT"
            echo "Event '$EVENT_NAME' does not need to skip linting steps; continuing."
          fi

  verify:
    needs: release_check
    if: needs.release_check.outputs.skip_steps != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
          registry-url: https://registry.npmjs.org/
          cache: npm
      - name: Installing the dependencies
        uses: AnnAngela/cached_node-modules@v5
        with:
          command: npm run ci

      - name: Check environment
        run: npx eslint --env-info
      - name: Sync package metadata
        run: npm run sync:packages
      - name: Run workspace verification
        run: npm run verify
      - name: Push changes if needed
        run: |
          bash scripts/gha/push.sh "auto: sync workspace package metadata"

  publish:
    needs:
      - release_check
      - verify
    if: always() && github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (needs.release_check.outputs.skip_steps == 'true' || needs.verify.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
          registry-url: https://registry.npmjs.org/
          cache: npm
      - name: Installing the dependencies
        uses: AnnAngela/cached_node-modules@v5
        with:
          command: npm run ci
      - name: Create release PR or publish packages
        uses: changesets/action@v1.7.0
        with:
          version: npm run version
          publish: npm run release
          commit: "ci: version packages"
          title: "ci: version packages"

name: Node.js Verify and Publish

on:
  push:
  merge_group:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: 0 23 * * * # Every 07:00 CST

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}

jobs:
  prepare:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      skip_steps: ${{ steps.release_check.outputs.skip_steps }}
      node-versions: ${{ steps.versions.outputs.node-versions }}
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Detect versioning commit
        id: release_check
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "merge_group" ]; then
            pattern='^ci: version packages( \(#[0-9]+\))?$'
            if printf '%s' "$COMMIT_MESSAGE" | grep -Eq "$pattern"; then
              echo "skip_steps=true" >> "$GITHUB_OUTPUT"
              echo "Versioning commit detected; skipping verification steps."
            else
              echo "skip_steps=false" >> "$GITHUB_OUTPUT"
              echo "Regular run; continuing."
            fi
          else
            echo "skip_steps=false" >> "$GITHUB_OUTPUT"
            echo "Event '$EVENT_NAME' does not need to skip linting steps; continuing."
          fi

      - name: Extract Node.js versions
        id: versions
        run: |
          VERSIONS=$(jq -r '.engines.node' package.json | grep -oP '(?<=\^)\d+(?=\.)' | sort -un | jq -R . | jq -sc .)
          echo "node-versions=$VERSIONS" >> "$GITHUB_OUTPUT"

  verify:
    needs: prepare
    if: needs.prepare.outputs.skip_steps != 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJSON(needs.prepare.outputs.node-versions) }}
    outputs:
      need_sync: ${{ steps.sync_packages.outputs.need_sync }}
    name: Verify on Node.js ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/cache@v5
        with:
          key: project-cache-${{ matrix.node-version }}
          path: .cache
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: |
            - args:
                - --frozen-lockfile
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true
          cache: pnpm

      - name: Check environment
        run: pnpm exec eslint --env-info
      - name: Sync package metadata
        id: sync_packages
        run: pnpm run sync:packages --set-gha-output
      - name: Run workspace verification
        env:
          MATRIX_NODE_VERSION: ${{ matrix.node-version }}
        run: |
          mkdir -p .cache
          SUMMARY_FILE=".cache/verify-coverage-summary-${MATRIX_NODE_VERSION}.md"
          touch "$SUMMARY_FILE"
          set +e
          GITHUB_STEP_SUMMARY="$SUMMARY_FILE" pnpm run verify:ci
          EXIT_CODE=$?
          set -e
          if [[ -f "$SUMMARY_FILE" ]]; then
            sed "s/## Vitest Test Report/## Vitest Test Report (Node.js ${MATRIX_NODE_VERSION} - coverage)/" \
              "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $EXIT_CODE
  push-changes:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.need_sync == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/cache@v5
        with:
          key: project-cache-${{ matrix.node-version }}
          path: .cache
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: |
            - args:
                - --frozen-lockfile
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          check-latest: true
          cache: pnpm
      - name: Sync package metadata
        run: pnpm run sync:packages
      - name: Auto-commit workspace metadata drift
        run: |
          bash scripts/gha/push.sh "auto: sync workspace package metadata"

  publish:
    needs:
      - prepare
      - verify
    if: always() && github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (needs.prepare.outputs.skip_steps == 'true' || needs.verify.result == 'success')
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: |
            - args:
                - --frozen-lockfile
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          check-latest: true
          cache: pnpm
      - name: Create release PR or publish packages
        uses: changesets/action@v1.8.0
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "ci: version packages"
          title: "ci: version packages"

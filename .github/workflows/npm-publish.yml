name: Node.js Package Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
          registry-url: https://registry.npmjs.org/
          cache: npm
      - name: Detect release state
        id: release-state
        run: node ./scripts/ci/npmPublishReleaseState.js
      - name: Update npm
        if: steps.release-state.outputs.should-run == 'true'
        run: npm install -g npm@latest
      - name: Installing the dependencies
        if: steps.release-state.outputs.should-run == 'true'
        uses: AnnAngela/cached_node-modules@v5
        with:
          command: npm run ci

      - name: Check environment
        if: steps.release-state.outputs.should-run == 'true'
        run: npx eslint --env-info
      - name: Run workspace verification
        if: steps.release-state.outputs.should-run == 'true'
        run: npm run verify
      - name: Summarize pending changesets
        if: steps.release-state.outputs.should-run == 'true'
        run: |
          set -euo pipefail
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            npx changeset status --output=/tmp/changeset-status.json
            cat /tmp/changeset-status.json
          else
            echo "No pending changesets found."
          fi
      - name: Skip publish flow when no release work is pending
        if: steps.release-state.outputs.should-run != 'true'
        run: echo "No pending changesets or unpublished package versions found. Skipping publish flow."
      - name: Create release PR or publish packages
        if: steps.release-state.outputs.should-run == 'true'
        uses: changesets/action@v1.7.0
        with:
          version: npm run version
          publish: npm run release
          commit: "ci: version packages"
          title: "ci: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Node.js Package Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
          registry-url: https://registry.npmjs.org/
          cache: npm
      - name: Detect release state
        id: release-state
        run: |
          set -euo pipefail
          node --input-type=module <<'EOF'
          import { execFileSync } from 'node:child_process';
          import { readdirSync, readFileSync, writeFileSync } from 'node:fs';
          import { join } from 'node:path';

          const repoRoot = process.cwd();
          const changesetFiles = readdirSync(join(repoRoot, '.changeset'))
            .filter((file) => file.endsWith('.md') && file !== 'README.md');
          const hasPendingChangesets = changesetFiles.length > 0;

          if (hasPendingChangesets) {
            execFileSync(
              'npx',
              ['--yes', '@changesets/cli@2.30.0', 'status', '--output=/tmp/changeset-status.json'],
              { stdio: 'inherit' },
            );
            console.log('Pending changesets detected.');
          } else {
            console.log('No pending changesets found.');
          }

          const packageJsonFiles = readdirSync(join(repoRoot, 'packages'), { withFileTypes: true })
            .filter((entry) => entry.isDirectory())
            .map((entry) => join(repoRoot, 'packages', entry.name, 'package.json'));

          const unpublishedPackages = [];

          for (const packageJsonFile of packageJsonFiles) {
            const pkg = JSON.parse(readFileSync(packageJsonFile, 'utf8'));

            if (pkg.private === true) {
              continue;
            }

            try {
              execFileSync(
                'npm',
                ['view', `${pkg.name}@${pkg.version}`, 'version', '--json'],
                { stdio: 'pipe' },
              );
            } catch (error) {
              unpublishedPackages.push({ name: pkg.name, version: pkg.version });
            }
          }

          if (unpublishedPackages.length > 0) {
            console.log('Unpublished package versions detected:');
            console.log(JSON.stringify(unpublishedPackages, null, 2));
          } else {
            console.log('No unpublished package versions found.');
          }

          const shouldRun = hasPendingChangesets || unpublishedPackages.length > 0;

          writeFileSync(
            process.env.GITHUB_OUTPUT,
            [
              `has-pending-changesets=${hasPendingChangesets}`,
              `has-unpublished-packages=${unpublishedPackages.length > 0}`,
              `should-run=${shouldRun}`,
            ].join('\n') + '\n',
            { flag: 'a' },
          );
          EOF
      - name: Update npm
        if: steps.release-state.outputs.should-run == 'true'
        run: npm install -g npm@latest
      - name: Installing the dependencies
        if: steps.release-state.outputs.should-run == 'true'
        uses: AnnAngela/cached_node-modules@v5
        with:
          command: npm run ci

      - name: Check environment
        if: steps.release-state.outputs.should-run == 'true'
        run: npx eslint --env-info
      - name: Run workspace verification
        if: steps.release-state.outputs.should-run == 'true'
        run: npm run verify
      - name: Summarize pending changesets
        if: steps.release-state.outputs.should-run == 'true'
        run: |
          set -euo pipefail
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            npx changeset status --output=/tmp/changeset-status.json
            cat /tmp/changeset-status.json
          else
            echo "No pending changesets found."
          fi
      - name: Skip publish flow when no release work is pending
        if: steps.release-state.outputs.should-run != 'true'
        run: echo "No pending changesets or unpublished package versions found. Skipping publish flow."
      - name: Create release PR or publish packages
        if: steps.release-state.outputs.should-run == 'true'
        uses: changesets/action@v1.7.0
        with:
          version: npm run version
          publish: npm run release
          commit: "ci: version packages"
          title: "ci: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

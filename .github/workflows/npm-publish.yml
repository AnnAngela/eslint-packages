name: Node.js Verify and Publish

on:
  push:
  merge_group:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: 0 23 * * * # Every 07:00 CST

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}

jobs:
  prepare:
    permissions: {}
    runs-on: ubuntu-latest
    outputs:
      skip_steps: ${{ steps.release_check.outputs.skip_steps }}
      node-versions: ${{ steps.versions.outputs.node-versions }}
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Detect versioning commit
        id: release_check
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "merge_group" ]; then
            pattern='^ci: version packages( \(#[0-9]+\))?$'
            if printf '%s' "$COMMIT_MESSAGE" | grep -Eq "$pattern"; then
              echo "skip_steps=true" >> "$GITHUB_OUTPUT"
              echo "Versioning commit detected; skipping verification steps."
            else
              echo "skip_steps=false" >> "$GITHUB_OUTPUT"
              echo "Regular run; continuing."
            fi
          else
            echo "skip_steps=false" >> "$GITHUB_OUTPUT"
            echo "Event '$EVENT_NAME' does not need to skip linting steps; continuing."
          fi

      - name: Extract Node.js versions
        id: versions
        run: |
          set -euo pipefail
          node_version_range="$(
            awk '
              /"engines"[[:space:]]*:[[:space:]]*{/ {
                in_engines = 1
                depth = 1
                next
              }
              in_engines {
                line = $0
                open_braces = gsub(/\{/, "{", line)
                close_braces = gsub(/\}/, "}", line)
                if (match($0, /"node"[[:space:]]*:[[:space:]]*"([^"]+)"/, matches)) {
                  print matches[1]
                  exit
                }
                depth += open_braces - close_braces
                if (depth <= 0) {
                  exit
                }
              }
            ' package.json
          )"
          if [ -z "$node_version_range" ]; then
            echo "Failed to read engines.node from package.json" >&2
            exit 1
          fi

          node_versions="$(
            printf '%s\n' "$node_version_range" \
              | grep -Eo '\^[0-9]+' \
              | tr -d '^' \
              | sort -un \
              | awk 'BEGIN { printf "[" } { if (NR > 1) printf ", "; printf "%s", $0 } END { printf "]" }'
          )"
          if [ "$node_versions" = "[]" ]; then
            echo "Failed to derive any Node.js major versions from: $node_version_range" >&2
            exit 1
          fi

          echo "node-versions=$node_versions" >> "$GITHUB_OUTPUT"
          echo "Detected Node.js versions: $node_versions"

  verify:
    needs: prepare
    if: needs.prepare.outputs.skip_steps != 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJSON(needs.prepare.outputs.node-versions) }}
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: |
            - args:
                - --frozen-lockfile
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true
          cache: pnpm

      - name: Check environment
        run: pnpm exec eslint --env-info
      - name: Sync package metadata
        run: pnpm run sync:packages
      - name: Run workspace verification
        run: pnpm run verify:ci
      - name: Run smoke tests
        run: pnpm run test:smoke
      - name: Push changes if needed
        run: |
          bash scripts/gha/push.sh "auto: sync workspace package metadata"

  publish:
    needs:
      - prepare
      - verify
    if: always() && github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (needs.prepare.outputs.skip_steps == 'true' || needs.verify.result == 'success')
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: |
            - args:
                - --frozen-lockfile
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          check-latest: true
          cache: pnpm
      - name: Create release PR or publish packages
        uses: changesets/action@v1.8.0
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "ci: version packages"
          title: "ci: version packages"

name: Publish

# 此 workflow 仅通过 workflow_call 被 verify-and-publish.yml 调用，
# 不能由 push、pull_request、schedule 等事件直接触发。
# 这样确保发布流程与校验流程保持严格的调用关系，避免绕过校验直接发布。
on:
  workflow_call:
    inputs:
      ref:
        description: 'Commit SHA checked out and verified by the caller'
        required: true
        type: string

jobs:
  publish:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag: v6.0.2
        with:
          fetch-depth: 1
          # 使用调用方传入的 ref（github.sha），而非默认的 master HEAD，
          # 避免在 verify 完成后、publish 执行前有新的 commit 推入 master，
          # 导致发布未经校验的代码
          ref: ${{ inputs.ref }}
          show-progress: false
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # tag: v6.0.8
        with:
          run_install: true
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # tag: v6.4.0
        with:
          node-version-file: package.json
          check-latest: true
          cache: pnpm
      - name: Create release PR or publish packages
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # tag: v1.8.0
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "ci: version packages"
          title: "ci: version packages"

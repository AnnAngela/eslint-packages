name: Node.js Verify and Publish

on:
  push:
  merge_group:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: 0 23 * * * # Every 07:00 CST

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}

jobs:
  prepare:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      skip_steps: ${{ steps.release_check.outputs.skip_steps }}
      node-versions: ${{ steps.versions.outputs.node-versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          show-progress: false

      - name: Detect versioning commit
        id: release_check
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "merge_group" ]; then
            pattern='^ci: version packages( \(#[0-9]+\))?$'
            if printf '%s' "$COMMIT_MESSAGE" | grep -Eq "$pattern"; then
              echo "skip_steps=true" >> "$GITHUB_OUTPUT"
              echo "Versioning commit detected; skipping verification steps."
            else
              echo "skip_steps=false" >> "$GITHUB_OUTPUT"
              echo "Regular run; continuing."
            fi
          else
            echo "skip_steps=false" >> "$GITHUB_OUTPUT"
            echo "Event '$EVENT_NAME' does not need to skip linting steps; continuing."
          fi

      - name: Extract Node.js versions
        id: versions
        run: |
          VERSIONS=$(jq -r '.engines.node' package.json | grep -oP '(?<=\^)\d+(?=\.)' | sort -un | jq -R . | jq -sc .)
          echo "node-versions=$VERSIONS" >> "$GITHUB_OUTPUT"

  verify:
    needs: prepare
    if: needs.prepare.outputs.skip_steps != 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJSON(needs.prepare.outputs.node-versions) }}
    # NOTE: When a job has a matrix strategy, GitHub Actions takes the outputs
    # from the last variant that completed. The `need_sync` output is set during
    # the verify step in the last matrix variant to finish, implicitly overriding
    # values from earlier variants. Since the drift check is deterministic across
    # Node.js versions, all variants produce the same `need_sync` value.
    outputs:
      need_sync: ${{ steps.verify.outputs.need_sync }}
    name: Verify on Node.js ${{ matrix.node-version || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          show-progress: false
      - name: Restore project cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: project-cache-${{ matrix.node-version }}
          path: .cache
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: |
            - args:
                - --no-frozen-lockfile
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true
          cache: pnpm

      - name: Check environment
        run: pnpm exec eslint --env-info
      - name: Run workspace verification
        id: verify
        env:
          SET_GHA_OUTPUT: "true"
          MATRIX_NODE_VERSION: ${{ matrix.node-version }}
        run: |
          mkdir -p .cache
          SUMMARY_FILE=".cache/verify-coverage-summary-${MATRIX_NODE_VERSION}.md"
          touch "$SUMMARY_FILE"
          set +e
          GITHUB_STEP_SUMMARY="$SUMMARY_FILE" pnpm run verify:ci
          EXIT_CODE=$?
          set -e
          if [[ -f "$SUMMARY_FILE" ]]; then
            sed "s/## Vitest Test Report/## Vitest Test Report (Node.js ${MATRIX_NODE_VERSION} - coverage)/" \
              "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $EXIT_CODE
  push-changes:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.need_sync == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false
      - name: Restore project cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: project-cache-push
          path: .cache
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: |
            - args:
                - --no-frozen-lockfile
      - name: Use Node.js from package.json
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          check-latest: true
          cache: pnpm
      - name: Sync package metadata
        run: pnpm run sync:packages
      - name: Auto-commit workspace metadata drift
        run: |
          bash scripts/gha/push.sh "auto: sync workspace package metadata"

  call-publish:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
      - push-changes
    # always() 确保即使 verify 或 push-changes 被跳过，仍能评估后续条件
    if: |
      always() &&
      github.ref == 'refs/heads/master' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (needs.prepare.outputs.skip_steps == 'true' || needs.verify.result == 'success') &&
      (needs.push-changes.result == 'success' || needs.push-changes.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          # 使用触发本次 workflow 的 commit SHA，而非默认的 master HEAD，
          # 避免在 verify 完成后、publish 执行前有新的 commit 推入 master，
          # 导致发布未经校验的代码
          ref: ${{ github.sha }}
          show-progress: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: true

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          check-latest: true
          cache: pnpm

      - name: Create release PR or publish packages
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "ci: version packages"
          title: "ci: version packages"

name: Pinact Check

on:
  pull_request:
    paths:
      - .github/workflows/*

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag: v6.0.2
        with:
          fetch-depth: 1
          show-progress: false

      - name: Run pinact check
        uses: suzuki-shunsuke/pinact-action@896d595f299e71d65b9d28349d6956abe144390a # tag: v3.0.0
        with:
          fix: "false"
          verify: "true"
          verify_min_age: "true"
          review: "true"
          config: ".pinact.yaml"
          separator: " # tag: "
